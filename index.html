<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ff8fb6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>YangYang's Snack Garden</title>
  <style>
:root {
  --pink: #ff8fb6;
  --deep-pink: #ec5d93;
  --cream: #fff5dd;
  --mint: #a7efd3;
  --lavender: #d9c4ff;
  --ink: #503045;
  --shadow: rgba(108, 44, 75, 0.22);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #ffd7e4; }
body {
  font-family: ui-rounded, "SF Pro Rounded", "Nunito", "Comic Sans MS", system-ui, sans-serif;
  color: var(--ink);
  touch-action: none;
  user-select: none;
}
#app {
  position: fixed; inset: 0; overflow: hidden;
  background:
    radial-gradient(circle at 80% 12%, rgba(255,248,217,.95), transparent 26%),
    radial-gradient(circle at 18% 8%, rgba(255,232,247,.85), transparent 30%),
    linear-gradient(160deg, #ffd1e3 0%, #ffe7c3 48%, #c7f2dd 100%);
}
#game { display: block; width: 100vw; height: 100dvh; }

#hud { position: fixed; z-index: 5; top: max(10px, env(safe-area-inset-top)); left: 10px; right: 10px; display: flex; gap: 8px; justify-content: space-between; pointer-events: none; }
.bubble {
  min-width: 84px; padding: 8px 11px;
  border-radius: 999px;
  background: linear-gradient(180deg, rgba(255,255,255,.82), rgba(255,235,245,.7));
  border: 2px solid rgba(255,255,255,.9);
  box-shadow:
    0 8px 22px var(--shadow),
    inset 0 -3px 0 rgba(255,143,182,.22),
    inset 0 2px 0 rgba(255,255,255,.7);
  backdrop-filter: blur(10px);
  text-align: center;
  animation: float 4s ease-in-out infinite;
}
.score-bubble { animation-delay: 0s; }
.mood-bubble  { animation-delay: -1.3s; }
.time-bubble  { animation-delay: -2.6s; }
.bubble .label { display:block; font-size: 10px; text-transform: uppercase; letter-spacing: .14em; opacity: .68; font-weight: 900; }
.bubble strong { font-size: 20px; line-height: 1; color: #b93e75; text-shadow: 0 1px 0 rgba(255,255,255,.7); }

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-3px); }
}

.panel {
  position: fixed; z-index: 10; left: 50%; top: 50%; transform: translate(-50%, -50%);
  width: min(88vw, 430px);
  padding: 25px 22px 22px;
  border-radius: 34px;
  text-align: center;
  background:
    radial-gradient(circle at 30% 0%, rgba(255,243,224,.9), transparent 60%),
    rgba(255, 255, 255, .82);
  border: 3px solid rgba(255,255,255,.95);
  box-shadow:
    0 26px 60px rgba(110, 48, 78, .28),
    inset 0 -8px 0 rgba(255,143,182,.16),
    inset 0 4px 0 rgba(255,255,255,.65);
  backdrop-filter: blur(18px);
}
.panel.hidden { display:none; }
.panel::before, .panel::after {
  content: "♡"; position: absolute; top: 14px; font-size: 20px; color: rgba(255,143,182,.55);
  animation: float 3s ease-in-out infinite;
}
.panel::before { left: 18px; }
.panel::after  { right: 18px; animation-delay: -1.5s; }

.mascot {
  width: 76px; height: 76px;
  display: grid; place-items: center;
  margin: -60px auto 8px;
  border-radius: 50%;
  background: linear-gradient(160deg, #fff3cf, #ffd4e4 70%, #ffaecf);
  border: 4px solid white;
  box-shadow: 0 12px 24px var(--shadow), inset 0 -4px 0 rgba(255,143,182,.3);
  font-size: 38px;
  animation: float 2.8s ease-in-out infinite;
}
h1, h2 { margin: 5px 0 8px; color: #b93675; line-height: .95; letter-spacing: -.04em; text-shadow: 0 2px 0 white, 0 4px 14px rgba(236,93,147,.18); }
h1 { font-size: clamp(36px, 10vw, 56px); }
h2 { font-size: clamp(30px, 8vw, 46px); }
p { font-size: 15px; line-height: 1.45; margin: 10px 0 18px; color: #6a3e58; }
small { display:block; margin-top: 12px; opacity:.7; font-weight: 800; }
button {
  appearance: none; border: 0; border-radius: 999px;
  padding: 14px 24px;
  background: linear-gradient(180deg, #ff8ebf, #e74789);
  color: white; font-weight: 1000; font-size: 18px;
  letter-spacing: .02em;
  box-shadow:
    0 10px 0 #b72f69,
    0 18px 30px rgba(183,47,105,.28),
    inset 0 2px 0 rgba(255,255,255,.45);
  transform: translateY(0);
  transition: transform .08s ease, box-shadow .08s ease;
}
button:hover { transform: translateY(-1px); }
button:active { transform: translateY(5px); box-shadow: 0 5px 0 #b72f69, 0 10px 18px rgba(183,47,105,.2); }

#joystick {
  position: fixed; z-index: 6;
  left: max(18px, env(safe-area-inset-left));
  bottom: max(18px, env(safe-area-inset-bottom));
  width: 108px; height: 108px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 35% 30%, rgba(255,255,255,.7), rgba(255,255,255,.1) 60%),
    rgba(255,255,255,.34);
  border: 2px solid rgba(255,255,255,.7);
  box-shadow:
    inset 0 0 24px rgba(255,255,255,.55),
    0 10px 28px rgba(97, 46, 75, .18);
  backdrop-filter: blur(8px);
}
#stick {
  position: absolute; left: 50%; top: 50%;
  width: 50px; height: 50px; margin-left: -25px; margin-top: -25px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 25%, #fff, #ff9cc1 45%, #ef5d95);
  border: 2px solid white;
  box-shadow: 0 8px 16px rgba(97, 46, 75, .24), inset 0 -4px 8px rgba(183,47,105,.3);
  transition: transform .08s linear;
}

@media (min-width: 760px) {
  #joystick { opacity: .82; }
  .bubble { min-width: 110px; }
}

@media (prefers-reduced-motion: reduce) {
  .bubble, .mascot, .panel::before, .panel::after { animation: none; }
}

  </style>
</head>
<body>
  <main id="app" aria-label="YangYang browser game">
    <canvas id="game" aria-label="Game canvas" role="img"></canvas>

    <section id="hud" aria-live="polite">
      <div class="bubble score-bubble">
        <span class="label">snacks</span>
        <strong id="score">0</strong>
      </div>
      <div class="bubble mood-bubble">
        <span class="label">mood</span>
        <strong id="mood">hungry</strong>
      </div>
      <div class="bubble time-bubble">
        <span class="label">time</span>
        <strong id="time">60</strong>
      </div>
    </section>

    <section id="titleCard" class="panel">
      <div class="mascot">囡</div>
      <h1>YangYang's<br/>Snack Garden</h1>
      <p>Help YangYang collect dumplings, baozi, tanghulu, noodles, mooncakes, and bubble tea before picnic time ends.</p>
      <button id="startBtn" type="button">Start picnic ✨</button>
      <small>Move with touch-drag, joystick, arrow keys, or WASD.</small>
    </section>

    <section id="gameOver" class="panel hidden">
      <div class="mascot">🍜</div>
      <h2 id="endTitle">Picnic complete!</h2>
      <p id="endText"></p>
      <button id="restartBtn" type="button">Play again 🥟</button>
    </section>

    <div id="joystick" aria-hidden="true">
      <div id="stick"></div>
    </div>
  </main>
  <script>
(() => {
  'use strict';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d', { alpha: false });
  const scoreEl = document.getElementById('score');
  const moodEl = document.getElementById('mood');
  const timeEl = document.getElementById('time');
  const titleCard = document.getElementById('titleCard');
  const gameOver = document.getElementById('gameOver');
  const endTitle = document.getElementById('endTitle');
  const endText = document.getElementById('endText');
  const startBtn = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');
  const joystick = document.getElementById('joystick');
  const stick = document.getElementById('stick');

  const state = {
    w: 0, h: 0, dpr: 1,
    running: false,
    over: false,
    score: 0,
    combo: 0,
    timeLeft: 60,
    last: 0,
    spawnTimer: 0,
    sparkleTimer: 0,
    keys: Object.create(null),
    pointer: { active: false, id: null, x: 0, y: 0, targetX: 0, targetY: 0 },
    joy: { active: false, id: null, dx: 0, dy: 0 },
    cameraShake: 0,
    floatingTexts: [],
    foods: [],
    petals: [],
    puffs: []
  };

  const yang = {
    x: 220, y: 260, vx: 0, vy: 0, r: 30,
    speed: 245, face: 1, blink: 0, happy: 0
  };

  const palette = {
    skin: '#ffe1ca',
    skinShade: '#f4c2a4',
    hairDark: '#3a2418',
    hairMid: '#5a3826',
    hairWarm: '#9a6a47',
    hairHi: '#e0b48a',
    dressLight: '#fffaf0',
    dressShade: '#f1e1c8',
    dressDeep: '#dec9ac',
    blush: 'rgba(255,140,170,.55)',
    lip: '#c64a76',
    eye: '#2a1a14',
    eyeIris: '#6b4127'
  };

  const foods = [
    // === CHINESE CLASSICS ===
    { name: 'dumpling', emoji: '🥟', pts: 2, color: '#fff1c1' },
    { name: 'baozi', emoji: '🍥', pts: 2, color: '#fff8f1' },
    { name: 'tanghulu', emoji: '🍡', pts: 2, color: '#ff6262' },
    { name: 'noodles', emoji: '🍜', pts: 3, color: '#ffd36b' },
    { name: 'mooncake', emoji: '🥮', pts: 3, color: '#d99648' },
    { name: 'boba', emoji: '🧋', pts: 3, color: '#c58a55' },
    { name: 'spring roll', emoji: '🌯', pts: 2, color: '#e8b960' },
    { name: 'peking duck', emoji: '🦆', pts: 5, color: '#c4743a' },
    { name: 'char siu', emoji: '🥩', pts: 4, color: '#e84643' },
    { name: 'dim sum', emoji: '🫖', pts: 3, color: '#d4b896' },
    { name: 'congee', emoji: '🥣', pts: 2, color: '#f5f0dc' },
    { name: 'hot pot', emoji: '🍲', pts: 5, color: '#e84532' },
    { name: 'mapo tofu', emoji: '🧈', pts: 3, color: '#d44a3a' },
    { name: 'kung pao', emoji: '🥜', pts: 3, color: '#c4823d' },
    { name: 'wonton soup', emoji: '🍵', pts: 3, color: '#f7e8c4' },
    { name: 'egg tart', emoji: '🥧', pts: 2, color: '#ffd966' },
    { name: 'sesame ball', emoji: '⚪', pts: 2, color: '#f0d9a0' },
    { name: 'scallion pancake', emoji: '🫓', pts: 2, color: '#e2c87a' },
    { name: 'xiaolongbao', emoji: '🧆', pts: 3, color: '#f5eee0' },
    // === MEATS & PROTEIN ===
    { name: 'sausage', emoji: '🌭', pts: 3, color: '#d4533a' },
    { name: 'steak', emoji: '🥩', pts: 5, color: '#9e2b1c' },
    { name: 'drumstick', emoji: '🍗', pts: 3, color: '#c47835' },
    { name: 'bacon', emoji: '🥓', pts: 2, color: '#c44a3a' },
    { name: 'egg', emoji: '🍳', pts: 1, color: '#ffeaa7' },
    { name: 'meatball', emoji: '🍖', pts: 2, color: '#a05030' },
    { name: 'pork belly', emoji: '🥓', pts: 4, color: '#e8967a' },
    { name: 'roast goose', emoji: '🪿', pts: 5, color: '#c4743a' },
    { name: 'ribs', emoji: '🦴', pts: 4, color: '#b54427' },
    // === VEGETABLES ===
    { name: 'aubergine', emoji: '🍆', pts: 2, color: '#6b3a7d' },
    { name: 'cucumber', emoji: '🥒', pts: 1, color: '#7ab648' },
    { name: 'corn', emoji: '🌽', pts: 2, color: '#f7d44a' },
    { name: 'broccoli', emoji: '🥦', pts: 2, color: '#4a8c3f' },
    { name: 'carrot', emoji: '🥕', pts: 1, color: '#f08a3d' },
    { name: 'mushroom', emoji: '🍄', pts: 2, color: '#d4a574' },
    { name: 'pepper', emoji: '🌶', pts: 1, color: '#e33a2c' },
    { name: 'garlic', emoji: '🧄', pts: 1, color: '#f5f0e8' },
    { name: 'potato', emoji: '🥔', pts: 2, color: '#c4a06b' },
    { name: 'bok choy', emoji: '🥬', pts: 2, color: '#5fa837' },
    // === FRUITS & SWEETS ===
    { name: 'banana', emoji: '🍌', pts: 1, color: '#f5e56c' },
    { name: 'watermelon', emoji: '🍉', pts: 2, color: '#7adf91' },
    { name: 'strawberry', emoji: '🍓', pts: 2, color: '#e84057' },
    { name: 'peach', emoji: '🍑', pts: 2, color: '#f6b092' },
    { name: 'cherry', emoji: '🍒', pts: 1, color: '#cc2233' },
    { name: 'grape', emoji: '🍇', pts: 2, color: '#8b5cf6' },
    { name: 'tangerine', emoji: '🍊', pts: 1, color: '#f39c3c' },
    { name: 'mango', emoji: '🥭', pts: 3, color: '#f5b642' },
    { name: 'pineapple', emoji: '🍍', pts: 3, color: '#e8b030' },
    { name: 'lychee', emoji: '🍈', pts: 2, color: '#f7cccf' },
    { name: 'cake', emoji: '🍰', pts: 3, color: '#ffccd5' },
    { name: 'ice cream', emoji: '🍦', pts: 2, color: '#fde8c8' },
    // === STREET FOOD & SNACKS ===
    { name: 'takoyaki', emoji: '🐙', pts: 3, color: '#e8c873' },
    { name: 'fried rice', emoji: '🍚', pts: 3, color: '#f5e6c4' },
    { name: 'taco', emoji: '🌮', pts: 2, color: '#f4c069' },
    { name: 'pizza', emoji: '🍕', pts: 4, color: '#e8853d' },
    { name: 'burger', emoji: '🍔', pts: 4, color: '#d4a050' },
    { name: 'fries', emoji: '🍟', pts: 1, color: '#f0c040' },
    { name: 'popcorn', emoji: '🍿', pts: 1, color: '#fff8dc' },
    { name: 'sushi', emoji: '🍣', pts: 3, color: '#ff9070' },
    { name: 'ramen', emoji: '🍜', pts: 4, color: '#f0a830' },
    { name: 'curry', emoji: '🍛', pts: 3, color: '#c9873a' },
    { name: 'rice cake', emoji: '🍘', pts: 2, color: '#f7ead4' },
    { name: 'crab rangoon', emoji: '🦀', pts: 3, color: '#e8c88a' }
  ];

  function resize() {
    state.dpr = Math.min(window.devicePixelRatio || 1, 2);
    state.w = Math.floor(window.innerWidth);
    state.h = Math.floor(window.innerHeight);
    canvas.width = Math.floor(state.w * state.dpr);
    canvas.height = Math.floor(state.h * state.dpr);
    canvas.style.width = state.w + 'px';
    canvas.style.height = state.h + 'px';
    ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
    yang.x = clamp(yang.x, 40, state.w - 40);
    yang.y = clamp(yang.y, 80, state.h - 40);
    seedPetals();
  }

  function seedPetals() {
    const count = Math.max(18, Math.floor((state.w * state.h) / 36000));
    state.petals = Array.from({ length: count }, () => ({
      x: Math.random() * state.w,
      y: Math.random() * state.h,
      s: 4 + Math.random() * 8,
      a: Math.random() * Math.PI * 2,
      sp: 8 + Math.random() * 24,
      hue: Math.random() > .5 ? '#ffd1e2' : '#fff1b5'
    }));
  }

  function start() {
    state.running = true;
    state.over = false;
    state.score = 0;
    state.combo = 0;
    state.timeLeft = 60;
    state.foods = [];
    state.puffs = [];
    state.floatingTexts = [];
    state.spawnTimer = 0;
    state.cameraShake = 0;
    yang.x = state.w * 0.5;
    yang.y = state.h * 0.64;
    yang.vx = yang.vy = 0;
    yang.happy = 0;
    titleCard.classList.add('hidden');
    gameOver.classList.add('hidden');
    for (let i = 0; i < 8; i++) spawnFood(true);
    updateHud();
  }

  function endGame() {
    state.running = false;
    state.over = true;
    const rank = state.score >= 60 ? 'Legendary snack queen!' : state.score >= 40 ? 'Super picnic!' : state.score >= 25 ? 'Happy tummy!' : 'Tiny snack stroll!';
    endTitle.textContent = rank;
    endText.textContent = `YangYang collected ${state.score} delicious snack points. ${state.score >= 40 ? 'She is doing a victory noodle dance!' : 'Try again for an even bigger feast!'}`;
    gameOver.classList.remove('hidden');
  }

  function spawnFood(initial = false) {
    const f = foods[Math.floor(Math.random() * foods.length)];
    const margin = 45;
    const item = {
      ...f,
      x: margin + Math.random() * (state.w - margin * 2),
      y: 90 + Math.random() * (state.h - 145),
      r: 17 + f.pts * 2,
      bob: Math.random() * Math.PI * 2,
      born: performance.now(),
      life: initial ? 999 : 11 + Math.random() * 6,
      spin: (Math.random() - .5) * 0.04
    };
    // Avoid spawning too close to YangYang.
    if (dist(item.x, item.y, yang.x, yang.y) < 90 && !initial) {
      item.x = state.w - item.x;
      item.y = state.h - item.y;
    }
    state.foods.push(item);
  }

  function update(dt) {
    if (!state.running) return;
    state.timeLeft -= dt;
    if (state.timeLeft <= 0) { state.timeLeft = 0; updateHud(); endGame(); return; }

    state.spawnTimer -= dt;
    const targetFoodCount = Math.min(14, 7 + Math.floor(state.score / 15));
    if (state.spawnTimer <= 0 && state.foods.length < targetFoodCount) {
      spawnFood();
      state.spawnTimer = Math.max(.35, 1.05 - state.score * .006);
    }

    const input = getInputVector();
    yang.vx = lerp(yang.vx, input.x * yang.speed, Math.min(1, dt * 12));
    yang.vy = lerp(yang.vy, input.y * yang.speed, Math.min(1, dt * 12));
    if (Math.abs(yang.vx) > 8) yang.face = Math.sign(yang.vx);
    yang.x = clamp(yang.x + yang.vx * dt, 28, state.w - 28);
    yang.y = clamp(yang.y + yang.vy * dt, 78, state.h - 28);
    yang.blink -= dt;
    if (yang.blink <= -2.6 - Math.random() * 2) yang.blink = .16;
    yang.happy = Math.max(0, yang.happy - dt * 1.5);

    for (const p of state.petals) {
      p.y += p.sp * dt;
      p.x += Math.sin(performance.now() * .001 + p.a) * 10 * dt;
      p.a += dt;
      if (p.y > state.h + 20) { p.y = -20; p.x = Math.random() * state.w; }
    }

    for (let i = state.foods.length - 1; i >= 0; i--) {
      const f = state.foods[i];
      f.bob += dt * 3;
      f.life -= dt;
      if (f.life <= 0) { state.foods.splice(i, 1); continue; }
      if (dist(f.x, f.y, yang.x, yang.y) < f.r + yang.r - 2) {
        collectFood(f);
        state.foods.splice(i, 1);
      }
    }

    for (let i = state.puffs.length - 1; i >= 0; i--) {
      const p = state.puffs[i];
      p.life -= dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 18 * dt;
      if (p.life <= 0) state.puffs.splice(i, 1);
    }
    for (let i = state.floatingTexts.length - 1; i >= 0; i--) {
      const t = state.floatingTexts[i];
      t.life -= dt;
      t.y -= 34 * dt;
      if (t.life <= 0) state.floatingTexts.splice(i, 1);
    }
    state.cameraShake = Math.max(0, state.cameraShake - dt * 18);
    updateHud();
  }

  function collectFood(f) {
    state.combo += 1;
    const bonus = state.combo >= 5 ? 2 : state.combo >= 3 ? 1 : 0;
    const gained = f.pts + bonus;
    state.score += gained;
    yang.happy = 1;
    state.cameraShake = 3.5;
    state.floatingTexts.push({ x: f.x, y: f.y - 16, text: `+${gained} ${f.name}!`, life: .9 });
    for (let i = 0; i < 12 + f.pts * 4; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 40 + Math.random() * 120;
      state.puffs.push({ x: f.x, y: f.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: .45 + Math.random() * .35, color: f.color });
    }
    if (navigator.vibrate) navigator.vibrate(20);
  }

  function getInputVector() {
    let x = 0, y = 0;
    if (state.keys.ArrowLeft || state.keys.a) x -= 1;
    if (state.keys.ArrowRight || state.keys.d) x += 1;
    if (state.keys.ArrowUp || state.keys.w) y -= 1;
    if (state.keys.ArrowDown || state.keys.s) y += 1;
    x += state.joy.dx; y += state.joy.dy;
    if (state.pointer.active) {
      const dx = state.pointer.targetX - yang.x;
      const dy = state.pointer.targetY - yang.y;
      const m = Math.hypot(dx, dy);
      if (m > 8) { x += dx / Math.max(m, 1); y += dy / Math.max(m, 1); }
    }
    const mag = Math.hypot(x, y);
    if (mag > 1) { x /= mag; y /= mag; }
    return { x, y };
  }

  function render() {
    const shakeX = state.cameraShake ? (Math.random() - .5) * state.cameraShake : 0;
    const shakeY = state.cameraShake ? (Math.random() - .5) * state.cameraShake : 0;
    ctx.save();
    ctx.translate(shakeX, shakeY);
    drawBackground();
    for (const f of state.foods) drawFood(f);

  function drawBackground() {
    // Sky-to-meadow pastel gradient
    const g = ctx.createLinearGradient(0, 0, 0, state.h);
    g.addColorStop(0, '#ffe4f0');
    g.addColorStop(0.3, '#fff3d8');

    // Sun glow (warm, soft)
    const sun = ctx.createRadialGradient(state.w * 0.82, 80, 10, state.w * 0.82, 80, 150);
    sun.addColorStop(0, 'rgba(255,242,180,.9)');
    sun.addColorStop(0.4, 'rgba(255,225,180,.32)');
    sun.addColorStop(1, 'rgba(255,225,180,0)');

    ctx.fillRect(0, 0, state.w, 260);

    // Twinkling sparkles in sky
    const tt = performance.now() * 0.001;
    ctx.save();

      const a = 0.4 + 0.5 * Math.sin(tt * 2 + i);
      ctx.globalAlpha = a * 0.7;
      circle(sx, sy, 1.2);
    }
    ctx.restore();

    // Rainbow ribbon in the sky
    ctx.save();
    ctx.globalAlpha = .18;
    const rainbow = ['#ff9bbf', '#ffd36b', '#a7efd3'];
    for (let i = 0; i < rainbow.length; i++) {
      ctx.strokeStyle = rainbow[i];
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.moveTo(-20, 60 + i * 10);
      ctx.bezierCurveTo(state.w * 0.3, 30 + i * 10, state.w * 0.6, 90 + i * 10, state.w + 20, 50 + i * 10);
      ctx.stroke();

    ctx.restore();

    // Distant rolling hills
    ctx.fillStyle = 'rgba(160,220,180,.55)';
    ctx.beginPath();
    ctx.moveTo(0, state.h * 0.55);
    ctx.bezierCurveTo(state.w * 0.25, state.h * 0.48, state.w * 0.55, state.h * 0.6, state.w, state.h * 0.5);
    ctx.lineTo(state.w, state.h);
    ctx.lineTo(0, state.h);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = 'rgba(190,235,200,.55)';
    ctx.beginPath();
    ctx.moveTo(0, state.h * 0.65);
    ctx.bezierCurveTo(state.w * 0.3, state.h * 0.58, state.w * 0.7, state.h * 0.72, state.w, state.h * 0.6);
    ctx.lineTo(state.w, state.h);
    ctx.lineTo(0, state.h);
    ctx.closePath();
    ctx.fill();

    // Clouds (drifting buns)
    drawCloud(state.w * .18, 96, 1.1);
    drawCloud(state.w * .55, 60, .7);
    drawCloud(state.w * .82, 170, .9);
    // tiny heart cloud
    drawHeartCloud(state.w * 0.38, 130, 0.9);

    // Picnic blanket (rounded, soft pink with checkered pattern)
    const blanketY = state.h - 170;
    const blanketGrad = ctx.createLinearGradient(0, blanketY, 0, blanketY + 140);
    blanketGrad.addColorStop(0, 'rgba(255,210,225,.7)');
    blanketGrad.addColorStop(1, 'rgba(255,178,205,.72)');
    ctx.fillStyle = blanketGrad;
    roundedRect(18, blanketY, state.w - 36, 140, 36, true);

    // checkered overlay (gingham vibe)
    ctx.save();
    ctx.beginPath();
    roundedRect(18, blanketY, state.w - 36, 140, 36, false);
    ctx.clip();
    ctx.globalAlpha = .18;
    ctx.fillStyle = '#ffffff';
    for (let y = blanketY; y < blanketY + 140; y += 22) {
      for (let x = 18; x < state.w - 18; x += 22) {
        if (((x / 22) | 0) % 2 === ((y / 22) | 0) % 2) {
          ctx.fillRect(x, y, 22, 22);
        }
      }
    }
    // diagonal stripe sheen
    ctx.globalAlpha = .08;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    for (let i = -200; i < state.w; i += 14) {
      ctx.beginPath();
      ctx.moveTo(i, blanketY); ctx.lineTo(i + 200, blanketY + 200);
      ctx.stroke();
    }
    ctx.restore();

    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,.8)'; ctx.lineWidth = 2;
    roundedRect(18, blanketY, state.w - 36, 140, 36, false);
    ctx.restore();

    // little picnic basket on blanket
    drawBasket(38, blanketY + 16);
    // teapot on right side
    drawTeapot(state.w - 60, blanketY + 28);

    // Decorative grass tufts at base
    ctx.save();
    ctx.strokeStyle = 'rgba(120,190,140,.75)'; ctx.lineWidth = 2; ctx.lineCap = 'round';
    for (let x = 10; x < state.w; x += 26) {
      const h = 6 + ((x * 13) % 7);
      line(x, state.h - 6, x - 2, state.h - 6 - h);
      line(x + 4, state.h - 6, x + 4, state.h - 6 - h - 1);
      line(x + 8, state.h - 6, x + 10, state.h - 6 - h);
    }
    ctx.restore();

    // Tiny tulips/mushrooms scattered
    drawTulip(state.w * 0.08, state.h * 0.62, '#ff9bbf');
    drawTulip(state.w * 0.18, state.h * 0.58, '#c9a3ff');
    drawTulip(state.w * 0.95, state.h * 0.66, '#ffd36b');
    drawTulip(state.w * 0.86, state.h * 0.6, '#ff9bbf');
    drawMushroom(state.w * 0.05, state.h * 0.78);
    drawMushroom(state.w * 0.93, state.h * 0.82);

    // Petals drifting
    for (const p of state.petals) {
      ctx.save();
      ctx.translate(p.x, p.y); ctx.rotate(p.a);
      ctx.fillStyle = p.hue;
      ctx.globalAlpha = .55;
      // five-petal flower shape
      for (let i = 0; i < 5; i++) {
        ctx.save();
        ctx.rotate((i / 5) * Math.PI * 2);
        ellipse(0, p.s * 0.4, p.s * 0.32, p.s * 0.55, true);
        ctx.restore();
      }
      ctx.globalAlpha = .8;
      ctx.fillStyle = '#fff5b8';
      circle(0, 0, p.s * 0.22);
      ctx.restore();
    }
  }

  function drawYangYang() {
    const t = performance.now() * .001;
    const speed = Math.min(1, Math.hypot(yang.vx, yang.vy) / yang.speed);
    const bounce = Math.sin(t * 10) * speed * 3;
    const walk = Math.sin(t * 12) * speed;
    const idleBreathe = Math.sin(t * 2.2) * 0.6 * (1 - speed);
    const smile = yang.happy;

    ctx.save();
    ctx.translate(yang.x, yang.y + bounce);
    ctx.scale(1.12, 1.12);

    // Ground shadow
    ctx.save();
    ctx.globalAlpha = .28;
    ctx.fillStyle = '#6d455f';

    ctx.globalAlpha = .12;

    ctx.scale(yang.face, 1);

    hairGrad.addColorStop(0.7, '#4a2820');
    hairGrad.addColorStop(1, '#8b5535');
    ctx.fillStyle = hairGrad;
    ctx.beginPath();

    ctx.beginPath();
    ctx.moveTo(-22, -32);
    ctx.bezierCurveTo(-36, -14, -35, 24, -23, 44);
    ctx.bezierCurveTo(-17, 38, -16, 15, -18, -4);
    ctx.bezierCurveTo(-20, -20, -21, -28, -22, -32);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(22, -32);
    ctx.bezierCurveTo(36, -14, 35, 24, 23, 44);
    ctx.bezierCurveTo(17, 38, 16, 15, 18, -4);
    ctx.bezierCurveTo(20, -20, 21, -28, 22, -32);
    ctx.closePath();
    ctx.fill();

    // === ELEGANT LONG LEGS ===
    ctx.fillStyle = '#ffe3cf';
    roundedRect(-8 + walk * 2, 28, 6.5, 16, 3, true);
    roundedRect(2 - walk * 2, 28, 6.5, 16, 3, true);

    ctx.fillStyle = '#d42a5c';
    ctx.beginPath();
    ctx.moveTo(-11 + walk * 2, 44); ctx.lineTo(-5 + walk * 2, 44);
    ctx.lineTo(-3 + walk * 2, 48); ctx.lineTo(-13 + walk * 2, 48);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(5 - walk * 2, 44); ctx.lineTo(11 - walk * 2, 44);
    ctx.lineTo(13 - walk * 2, 48); ctx.lineTo(3 - walk * 2, 48);
    ctx.closePath(); ctx.fill();
    // heel spike
    ctx.fillStyle = '#a81e46';
    ctx.fillRect(-7 + walk * 2, 47, 2, 3);
    ctx.fillRect(5 - walk * 2, 47, 2, 3);

    // === FORM-FITTING QIPAO ===
    const qipao = ctx.createLinearGradient(0, -8, 0, 36);
    qipao.addColorStop(0, '#ff4068');
    qipao.addColorStop(0.4, '#d42452');
    qipao.addColorStop(1, '#8a1036');
    ctx.fillStyle = qipao;
    ctx.strokeStyle = '#ffd05a';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    // Qipao silhouette: fitted bodice, slim waist, elegant flare
    ctx.moveTo(-12, -6);
    ctx.quadraticCurveTo(-16, 2, -14, 12);
    ctx.quadraticCurveTo(-12, 18, -10, 24);
    ctx.quadraticCurveTo(-16, 30, -19, 39);
    ctx.quadraticCurveTo(-14, 44, 0, 46);
    ctx.quadraticCurveTo(14, 44, 19, 39);
    ctx.quadraticCurveTo(16, 30, 10, 24);
    ctx.quadraticCurveTo(12, 18, 14, 12);
    ctx.quadraticCurveTo(16, 2, 12, -6);
    ctx.quadraticCurveTo(0, -10, -12, -6);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Side slit revealing leg
    ctx.fillStyle = '#ffe3cf';
    ctx.beginPath();
    ctx.moveTo(-18, 32);
    ctx.quadraticCurveTo(-12, 42, -8, 45);
    ctx.quadraticCurveTo(-4, 45, -8, 40);

    ctx.globalAlpha = .45;
    ctx.fillStyle = '#ffb8cc';

    ctx.arc(-4, 14, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath();

    ctx.arc(0, 22, 2, 0, Math.PI * 2); ctx.fill();

    ctx.moveTo(-22, -35);

    ctx.fill();

    // Sweeping side bangs
    const sweepBangs = [
      [-19, -38, -18, -28, -10, -25, -5, -41],
      [-8, -43, -10, -30, -2, -24, 4, -43],
      [2, -44, -1, -32, 5, -25, 12, -40],
      [10, -40, 8, -30, 16, -25, 22, -37]
    ];
    for (const b of sweepBangs) {
      ctx.beginPath();
      ctx.moveTo(b[0], b[1]);
      ctx.bezierCurveTo(b[2], b[3], b[4], b[5], b[6], b[7]);
      ctx.bezierCurveTo(b[6] - 4, b[7] - 5, b[0] + 2, b[1] - 4, b[0], b[1]);
      ctx.closePath();
      ctx.fill();
    }

    // Hair highlights
    ctx.save();
    ctx.globalAlpha = .28;
    ctx.fillStyle = '#c48a62';
    ctx.beginPath(); ctx.ellipse(-8, -46, 5, 1.5, -.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(9, -46, 5, 1.5, .2, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = .18;
    ctx.beginPath(); ctx.ellipse(-24, -4, 1.2, 13, -.06, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(24, -4, 1.2, 13, .06, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    // Cherry blossom hairpin
    ctx.fillStyle = '#ff7799';
    for (let i = 0; i < 5; i++) {
      const a = (i / 5) * Math.PI * 2;
      ctx.beginPath();
      ctx.ellipse(-17 + Math.cos(a) * 2.5, -48 + Math.sin(a) * 2.5, 2, 1.1, a, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = '#ffd05a';
    circle(-17, -48, 1.3);
    // Jade hair stick
    ctx.strokeStyle = '#5cd8b5'; ctx.lineWidth = 1.6; ctx.lineCap = 'round';

    ctx.moveTo(20, -52); ctx.lineTo(12, -40);

    ctx.fillStyle = '#ff4f75';
    circle(20, -52, 1.4);

    // === BEAUTIFUL FACE FEATURES ===
    // Elegant eyebrows
    ctx.strokeStyle = '#3a1f1a'; ctx.lineWidth = 1.2; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(-13, -29.5); ctx.quadraticCurveTo(-8, -31.5, -3, -30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(13, -29.5); ctx.quadraticCurveTo(8, -31.5, 3, -30); ctx.stroke();

    if (yang.blink > 0) {
      ctx.strokeStyle = '#1c100e'; ctx.lineWidth = 1.7; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(-12.5, -22); ctx.quadraticCurveTo(-8, -19, -3.5, -22); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(12.5, -22); ctx.quadraticCurveTo(8, -19, 3.5, -22); ctx.stroke();
      // long lashes visible when blinking
      ctx.strokeStyle = '#1c100e'; ctx.lineWidth = .9;
      line(-12.5, -22, -13.8, -23.5); line(12.5, -22, 13.8, -23.5);
    } else {
      // Big, captivating eyes with long lashes
      ctx.fillStyle = '#fffaf7';
      ellipse(-8, -22.5, 4.8, 6.4, true);
      ellipse(8, -22.5, 4.8, 6.4, true);
      const irisGrad = ctx.createLinearGradient(0, -28, 0, -17);
      irisGrad.addColorStop(0, '#1a0f0e');
      irisGrad.addColorStop(.5, '#602820');
      irisGrad.addColorStop(1, '#c96e3d');
      ctx.fillStyle = irisGrad;
      ellipse(-8, -22.3, 3.9, 5.6, true);
      ellipse(8, -22.3, 3.9, 5.6, true);
      ctx.fillStyle = '#120a0c';
      circle(-8, -22.5, 2.3);
      circle(8, -22.5, 2.3);
      // dual sparkle for beauty
      ctx.fillStyle = '#fff';
      circle(-9.6, -25.2, 1.35); circle(-6.8, -25.2, .7);
      circle(9.6, -25.2, 1.35); circle(6.8, -25.2, .7);
      ctx.fillStyle = 'rgba(255,255,255,.82)';
      circle(-6.2, -20.2, .75); circle(9.8, -20.2, .75);
      // elegant upper lashes
      ctx.strokeStyle = '#1c100e'; ctx.lineWidth = 1.3; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(-13, -26); ctx.quadraticCurveTo(-9, -28, -4, -26.8); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(13, -26); ctx.quadraticCurveTo(9, -28, 4, -26.8); ctx.stroke();
      // wing tips
      line(-13, -25, -15.2, -26.2); line(13, -25, 15.2, -26.2);
    }

    // Rosy blush — more refined
    ctx.fillStyle = 'rgba(255,110,140,.5)';
    ellipse(-13, -15, 3.8, 2.3, true);
    ellipse(13, -15, 3.8, 2.3, true);
    // subtle highlight on blush
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,.55)'; ctx.lineWidth = .6;
    line(-15, -15.5, -12.2, -16); line(14, -15.5, 11.2, -16);
    ctx.restore();

    // Elegant nose
    ctx.fillStyle = 'rgba(170,95,78,.35)';
    circle(0, -15.2, .6);

    // Beautiful lips — slight pout
    ctx.strokeStyle = '#c44068'; ctx.lineWidth = 1.3; ctx.lineCap = 'round';
    ctx.beginPath();
    if (smile > .1) {
      // open smile
      ctx.arc(0, -11.5, 3.2, .06, Math.PI - .06);
      ctx.stroke();
      ctx.fillStyle = '#ff6e96';
      ctx.beginPath(); ctx.arc(0, -10.8, 2.6, .15, Math.PI - .15); ctx.fill();
      ctx.fillStyle = '#ffbdd2';
      ctx.beginPath(); ctx.arc(0, -10, 1.4, 0, Math.PI); ctx.fill();
    } else {
      // demure, slightly fuller lips
      ctx.beginPath();
      ctx.moveTo(-2.4, -12);
      ctx.quadraticCurveTo(0, -11, 2.4, -12);
      ctx.stroke();
      // lower lip fullness
      ctx.fillStyle = '#e8557d';
      ctx.beginPath();
      ctx.ellipse(0, -11.5, 2, .9, 0, 0, Math.PI);
      ctx.fill();
    }

    // === 羊 charm on qipao ===
    ctx.save();
    ctx.scale(yang.face, 1);
    ctx.fillStyle = 'rgba(255,215,0,.55)';
    ctx.font = 'bold 9px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('羊', 0, 28);
    ctx.restore();

    // sparkles
    if (yang.happy > 0.3) {
      ctx.save();
      ctx.scale(yang.face, 1);
      ctx.fillStyle = `rgba(255,200,100,${yang.happy})`;
      ctx.font = 'bold 15px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('✦', -28 - yang.happy * 4, -50 - yang.happy * 6);
      ctx.fillText('♡', 28 + yang.happy * 4, -46 - yang.happy * 6);
      ctx.restore();
    }

    ctx.restore();
  }

  function drawPuff(p) {
    ctx.save(); ctx.globalAlpha = Math.max(0, p.life * 1.8); ctx.fillStyle = p.color; circle(p.x, p.y, 3 + p.life * 8); ctx.restore();
  }

  function drawFloatingText(t) {
    ctx.save(); ctx.globalAlpha = Math.min(1, t.life * 1.4); ctx.font = '900 18px ui-rounded, system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.lineWidth = 5; ctx.strokeStyle = '#fff'; ctx.fillStyle = '#d33d7c'; ctx.strokeText(t.text, t.x, t.y); ctx.fillText(t.text, t.x, t.y); ctx.restore();
  }

  function updateHud() {
    scoreEl.textContent = state.score;
    timeEl.textContent = Math.ceil(state.timeLeft);
    moodEl.textContent = yang.happy > .2 ? 'yummy!' : state.combo >= 5 ? 'combo!' : state.score > 25 ? 'happy' : 'hungry';
  }

  function loop(now) {
    const dt = Math.min(.033, (now - (state.last || now)) / 1000);
    state.last = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }

  function setJoystickVisual() {
    const max = 28;
    stick.style.transform = `translate(${state.joy.dx * max}px, ${state.joy.dy * max}px)`;
  }

  function pointerInJoystick(x, y) {
    const r = joystick.getBoundingClientRect();
    return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
  }
  function updateJoyFromPoint(x, y) {
    const r = joystick.getBoundingClientRect();
    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
    let dx = (x - cx) / (r.width * .36), dy = (y - cy) / (r.height * .36);
    const m = Math.hypot(dx, dy);
    if (m > 1) { dx /= m; dy /= m; }
    state.joy.dx = dx; state.joy.dy = dy; setJoystickVisual();
  }

  window.addEventListener('resize', resize);
  window.addEventListener('keydown', e => { state.keys[e.key] = true; if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault(); });
  window.addEventListener('keyup', e => { state.keys[e.key] = false; });

  canvas.addEventListener('pointerdown', e => {
    if (!state.running) return;
    if (pointerInJoystick(e.clientX, e.clientY)) return;
    state.pointer.active = true; state.pointer.id = e.pointerId;
    state.pointer.targetX = e.clientX; state.pointer.targetY = e.clientY;
    canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener('pointermove', e => {
    if (state.pointer.active && e.pointerId === state.pointer.id) {
      state.pointer.targetX = e.clientX; state.pointer.targetY = e.clientY;
    }
  });
  canvas.addEventListener('pointerup', e => { if (e.pointerId === state.pointer.id) state.pointer.active = false; });
  canvas.addEventListener('pointercancel', e => { if (e.pointerId === state.pointer.id) state.pointer.active = false; });

  joystick.addEventListener('pointerdown', e => {
    if (!state.running) return;
    state.joy.active = true; state.joy.id = e.pointerId; joystick.setPointerCapture(e.pointerId); updateJoyFromPoint(e.clientX, e.clientY);
  });
  joystick.addEventListener('pointermove', e => { if (state.joy.active && e.pointerId === state.joy.id) updateJoyFromPoint(e.clientX, e.clientY); });
  joystick.addEventListener('pointerup', e => { if (e.pointerId === state.joy.id) { state.joy.active = false; state.joy.dx = state.joy.dy = 0; setJoystickVisual(); } });
  joystick.addEventListener('pointercancel', e => { if (e.pointerId === state.joy.id) { state.joy.active = false; state.joy.dx = state.joy.dy = 0; setJoystickVisual(); } });

  startBtn.addEventListener('click', start);
  restartBtn.addEventListener('click', start);

  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
  function lerp(a, b, t) { return a + (b - a) * t; }
  function dist(x1,y1,x2,y2) { return Math.hypot(x1-x2, y1-y2); }
  function circle(x, y, r) { ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill(); }
  function ellipse(x, y, rx, ry, fill) { ctx.beginPath(); ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2); if (fill) ctx.fill(); else ctx.stroke(); }
  function line(x1, y1, x2, y2) { ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke(); }
  function roundedRect(x, y, w, h, r, fill) {
    r = Math.min(r, w/2, h/2); ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); if (fill) ctx.fill(); else ctx.stroke();
  }

  resize();
  requestAnimationFrame(loop);
})();

  </script>
</body>
</html>
